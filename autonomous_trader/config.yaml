# API Keys (use .env for secrets)
exchange:
  name: "bybit"
  testnet: true
  api_key: ""
  api_secret: ""

# Screening criteria for crypto
screener:
  universe: "crypto"  # crypto only now
  min_market_cap: 10_000_000  # $10M minimum
  min_age_days: 14  # at least 2 weeks old
  cache_ttl_minutes: 20
  momentum_window_days: 7  # 7d momentum as primary filter
  max_per_category: 3  # max per crypto category

# Analysis settings
analysis:
  model: "openrouter/stepfun/step-3.5-flash:free"
  max_tickers_per_run: 10
  timeout_minutes: 30
  prompt_template: "templates/crypto_analysis_prompt.md"
  use_tradingagents: false  # Use direct LLM with crypto-specific data
  weights:
    technical: 0.25
    sentiment: 0.25
    fundamentals: 0.30
    project_quality: 0.20
  btc_rsi_filter: 35  # Suppress BUY signals if BTC RSI < 35
  primary_timeframes: ["4h", "1D"]

# Trading parameters
trading:
  dry_run: true
  max_positions: 6  # Fewer positions for swing trading
  position_size_pct: 0.05  # 5% per position
  max_category_exposure_pct: 0.30  # Max per crypto category
  stop_loss_pct: 0.08  # 8% stop loss (wider for swing)
  take_profit_pct_1: 0.25  # Partial TP at 25%
  take_profit_pct_2: 0.50  # Full TP at 50%
  partial_take_profit: true
  min_confidence: 0.65
  quiet_hours_start: "02:00"  # UTC
  quiet_hours_end: "05:00"    # UTC
  market_hours_only: false  # Crypto trades 24/7
  execution_check_interval_minutes: 60  # Not high frequency

# Risk limits
risk:
  max_daily_loss_pct: 0.02
  max_drawdown_pct: 0.10
  max_position_value: 50000
  max_holding_days: 60
  holding_alert_days: 45  # Alert at this many days
  max_defi_exposure_pct: 0.30
  max_l1_exposure_pct: 0.30
  max_l2_exposure_pct: 0.30
  max_memecoin_exposure_pct: 0.20  # Configurable, can be 0 to disable
  allow_memecoins: true

# Execution scheduling (queue-based system)
execution:
  enabled: true
  run_during_market_hours_only: false  # Crypto is 24/7
  check_interval_minutes: 60
  signal_expiry_days: 7  # Signals valid for 1 week
  execute_at_market_open: false
  delay_after_open_minutes: 0

# Research phase (screening + analysis)
research:
  enabled: true
  run_when_market_closed: true
  schedule:
    daily_time: "18:00"
    frequency: "daily"
  auto_queue_signals: true
  max_signals_per_day: 5  # Fewer, higher conviction

# Queue management
queue:
  persistence: true
  deduplicate: true
  requeue_failed: true
  max_queue_size: 30
  max_position_size_pct: 0.05

# Phase control (for manual runs)
phases:
  research_only: false
  execute_only: false

# Schedule (legacy, for backward compatibility)
schedule:
  screen_time: "09:00"
  analyze_time: "10:00"
  execute_time: "11:00"
  market_hours_only: false
  timezone: "UTC"

# Logging & alerts
logging:
  level: "INFO"
  log_file: "logs/trading_agent.log"
  trade_log: "data/trade_log.csv"
  performance_log: "data/performance.csv"

alerts:
  enabled: false
  discord_webhook: ""
  notify_on: ["trade_executed", "position_closed", "stop_loss_hit", "holding_alert", "take_profit_1", "error"]

# API Keys for crypto data sources
api_keys:
  coingecko: ""
  coinmarketcap: ""
  cryptopanic: ""
  glassnode: ""
  defillama: ""
  reddit_client_id: ""
  reddit_client_secret: ""
